<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moscart Launcher Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
    min-height: 100vh;
  }
  
  h1 {
    font-size: 24px;
    margin-bottom: 8px;
    color: #fff;
  }
  
  .subtitle {
    color: #888;
    font-size: 12px;
    margin-bottom: 24px;
  }
  
  .card {
    background: #2a2a2a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #333;
  }
  
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 8px 0;
    padding: 8px 0;
    border-bottom: 1px solid #333;
  }
  .status-row:last-child { border-bottom: none; }
  
  .status-label {
    color: #999;
    font-size: 13px;
  }
  
  .status-value {
    font-weight: 600;
    font-size: 14px;
  }
  
  .badge {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  
  .badge-armed   { background: #c53030; color: white; }
  .badge-disarmed { background: #2d3748; color: #a0aec0; }
  .badge-detected { background: #d69e2e; color: white; }
  .badge-clear   { background: #2d3748; color: #a0aec0; }
  .badge-cooldown { background: #3182ce; color: white; }
  .badge-bt-on   { background: #38a169; color: white; }
  .badge-bt-off  { background: #2d3748; color: #a0aec0; }
  
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 6px 0;
    transition: opacity 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .btn-connect { background: #3182ce; color: white; }
  .btn-arm     { background: #c53030; color: white; }
  .btn-disarm  { background: #2d3748; color: white; }
  .btn-fire    { background: #d69e2e; color: white; font-size: 18px; }
  .btn-fire:disabled { background: #4a5568; }
  
  .distance-control {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 12px;
  }
  
  input[type="range"] {
    flex: 1;
    height: 30px;
  }
  
  input[type="number"] {
    width: 80px;
    padding: 8px;
    background: #1a1a1a;
    border: 1px solid #555;
    color: #fff;
    border-radius: 6px;
    text-align: right;
    font-size: 14px;
  }
  
  .distance-value {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin: 8px 0;
    color: #d69e2e;
  }
  
  .log {
    background: #0a0a0a;
    border: 1px solid #333;
    padding: 12px;
    border-radius: 8px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 11px;
    max-height: 160px;
    overflow-y: auto;
    margin-top: 8px;
    line-height: 1.5;
  }
  
  .log-entry { margin: 2px 0; color: #a0aec0; }
  .log-error { color: #fc8181; }
  .log-success { color: #68d391; }
  .log-fire { color: #f6ad55; font-weight: 600; }
  
  .section-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .warning {
    background: #742a2a;
    color: #fed7d7;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    border-left: 4px solid #c53030;
  }
</style>
</head>
<body>

<h1>🎯 Moscart Launcher</h1>
<div class="subtitle">Web Bluetooth Control v2</div>

<div id="warning" class="warning" style="display:none;">
  ⚠️ <strong>ARMED状態</strong>: センサー検知範囲に入ると自動発火します
</div>

<!-- 接続 -->
<div class="card">
  <div class="section-title">接続</div>
  <button id="btnConnect" class="btn-connect">BLE接続</button>
  <div class="status-row">
    <span class="status-label">接続状態</span>
    <span id="btState" class="badge badge-bt-off">未接続</span>
  </div>
</div>

<!-- システム状態 -->
<div class="card">
  <div class="section-title">システム状態</div>
  <div class="status-row">
    <span class="status-label">武装</span>
    <span id="armState" class="badge badge-disarmed">DISARMED</span>
  </div>
  <div class="status-row">
    <span class="status-label">検知</span>
    <span id="detectState" class="badge badge-clear">なし</span>
  </div>
  <div class="status-row">
    <span class="status-label">検知距離</span>
    <span id="detectDistance" class="status-value">- cm</span>
  </div>
  <div class="status-row">
    <span class="status-label">クールダウン</span>
    <span id="cooldownState" class="badge badge-clear">-</span>
  </div>
</div>

<!-- コントロール -->
<div class="card">
  <div class="section-title">操作</div>
  <button id="btnArm" class="btn-arm" disabled>🔴 ARM (武装)</button>
  <button id="btnDisarm" class="btn-disarm" disabled>⚫ DISARM (解除)</button>
  <button id="btnFire" class="btn-fire" disabled>💥 手動発火</button>
</div>

<!-- 距離設定 -->
<div class="card">
  <div class="section-title">検知距離設定</div>
  <div class="distance-value"><span id="distValue">100</span> cm</div>
  <div class="distance-control">
    <input type="range" id="distSlider" min="10" max="500" value="100" step="10">
    <input type="number" id="distInput" min="10" max="500" value="100" step="10">
  </div>
  <button id="btnSetDist" class="btn-connect" disabled>設定を送信</button>
</div>

<!-- ログ -->
<div class="card">
  <div class="section-title">ログ</div>
  <div id="log" class="log">
    <div class="log-entry">待機中...</div>
  </div>
</div>

<script>
const SERVICE_UUID     = '12345678-1234-5678-1234-56789abcdef0';
const CHAR_CMD_UUID    = '12345678-1234-5678-1234-56789abcdef1';
const CHAR_STATUS_UUID = '12345678-1234-5678-1234-56789abcdef2';

let device = null;
let cmdChar = null;
let statusChar = null;

const logEl = document.getElementById('log');

function log(msg, cls = '') {
  const div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  const now = new Date();
  const t = now.toTimeString().split(' ')[0];
  div.textContent = `[${t}] ${msg}`;
  logEl.insertBefore(div, logEl.firstChild);
  // 50行で打ち切り
  while (logEl.children.length > 50) {
    logEl.removeChild(logEl.lastChild);
  }
}

function setControlsEnabled(connected) {
  document.getElementById('btnArm').disabled    = !connected;
  document.getElementById('btnDisarm').disabled = !connected;
  document.getElementById('btnFire').disabled   = !connected;
  document.getElementById('btnSetDist').disabled = !connected;
}

// 接続
document.getElementById('btnConnect').addEventListener('click', async () => {
  try {
    log('スキャン中...');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'MoscartLauncher' }],
      optionalServices: [SERVICE_UUID]
    });
    
    log(`デバイス発見: ${device.name}`, 'success');
    
    device.addEventListener('gattserverdisconnected', () => {
      log('切断されました', 'error');
      document.getElementById('btState').textContent = '未接続';
      document.getElementById('btState').className = 'badge badge-bt-off';
      setControlsEnabled(false);
    });
    
    const server = await device.gatt.connect();
    log('GATT接続OK', 'success');
    
    const service = await server.getPrimaryService(SERVICE_UUID);
    cmdChar = await service.getCharacteristic(CHAR_CMD_UUID);
    statusChar = await service.getCharacteristic(CHAR_STATUS_UUID);
    
    // 状態通知を購読
    await statusChar.startNotifications();
    statusChar.addEventListener('characteristicvaluechanged', handleStatus);
    
    log('準備完了', 'success');
    document.getElementById('btState').textContent = '接続中';
    document.getElementById('btState').className = 'badge badge-bt-on';
    setControlsEnabled(true);
    
    // 初期状態取得
    sendCommand({cmd: 'get_status'});
    
  } catch (e) {
    log(`エラー: ${e.message}`, 'error');
  }
});

// 状態通知受信
function handleStatus(event) {
  const decoder = new TextDecoder();
  const value = decoder.decode(event.target.value);
  
  try {
    const status = JSON.parse(value);
    updateUI(status);
  } catch (e) {
    log(`JSON解析エラー: ${value}`, 'error');
  }
}

function updateUI(status) {
  // ARM状態
  const armEl = document.getElementById('armState');
  if (status.armed) {
    armEl.textContent = 'ARMED';
    armEl.className = 'badge badge-armed';
    document.getElementById('warning').style.display = 'block';
  } else {
    armEl.textContent = 'DISARMED';
    armEl.className = 'badge badge-disarmed';
    document.getElementById('warning').style.display = 'none';
  }
  
  // 検知状態
  const detEl = document.getElementById('detectState');
  if (status.detected) {
    detEl.textContent = '検知中';
    detEl.className = 'badge badge-detected';
  } else {
    detEl.textContent = 'なし';
    detEl.className = 'badge badge-clear';
  }
  
  // 距離
  document.getElementById('detectDistance').textContent = 
    status.target_cm > 0 ? `${status.target_cm} cm` : '- cm';
  
  // クールダウン
  const cdEl = document.getElementById('cooldownState');
  if (status.cooldown) {
    cdEl.textContent = '冷却中';
    cdEl.className = 'badge badge-cooldown';
  } else {
    cdEl.textContent = '準備OK';
    cdEl.className = 'badge badge-clear';
  }
  
  // 設定距離
  if (status.distance) {
    document.getElementById('distValue').textContent = status.distance;
  }
}

// コマンド送信
async function sendCommand(cmdObj) {
  if (!cmdChar) {
    log('未接続', 'error');
    return;
  }
  try {
    const json = JSON.stringify(cmdObj);
    const encoder = new TextEncoder();
    await cmdChar.writeValue(encoder.encode(json));
    log(`送信: ${json}`);
  } catch (e) {
    log(`送信エラー: ${e.message}`, 'error');
  }
}

document.getElementById('btnArm').addEventListener('click', () => {
  if (confirm('武装しますか？\nセンサー検知で自動発火します')) {
    sendCommand({cmd: 'arm'});
    log('🔴 ARM コマンド送信', 'fire');
  }
});

document.getElementById('btnDisarm').addEventListener('click', () => {
  sendCommand({cmd: 'disarm'});
  log('⚫ DISARM コマンド送信');
});

document.getElementById('btnFire').addEventListener('click', () => {
  if (confirm('手動発火しますか？')) {
    sendCommand({cmd: 'fire'});
    log('💥 手動発火コマンド送信', 'fire');
  }
});

// 距離設定
const distSlider = document.getElementById('distSlider');
const distInput = document.getElementById('distInput');
const distValueDisp = document.getElementById('distValue');

distSlider.addEventListener('input', (e) => {
  const v = e.target.value;
  distInput.value = v;
  distValueDisp.textContent = v;
});

distInput.addEventListener('input', (e) => {
  let v = parseInt(e.target.value) || 100;
  v = Math.max(10, Math.min(500, v));
  distSlider.value = v;
  distValueDisp.textContent = v;
});

document.getElementById('btnSetDist').addEventListener('click', () => {
  const v = parseInt(distInput.value);
  sendCommand({cmd: 'set_distance', value: v});
  log(`距離設定: ${v} cm`);
});

// 初期化
if (!navigator.bluetooth) {
  log('このブラウザはWeb Bluetoothに対応していません', 'error');
  log('Bluefy(iOS)またはChrome(Android/PC)を使用してください', 'error');
  document.getElementById('btnConnect').disabled = true;
} else {
  log('準備完了');
}
</script>
</body>
</html>
