<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moscart Control Terminal v4.2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #131722;
    --card: #1c2030;
    --border: #2a2f45;
    --text: #e0e6ed;
    --muted: #78829d;
    --accent: #3b82f6;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    transition: background 0.4s ease;
  }
  
  body.armed { background: #2d1414; }
  body.armed .card {
    background: #3d1b1b;
    border-color: #5c2424;
  }
  
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 12px; }
  
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.15);
  }
  
  .card-title {
    font-size: 14px;
    font-weight: bold;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-grid {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 12px;
    align-items: center;
  }
  .status-label { color: var(--muted); font-size: 14px; }
  .status-val { font-size: 16px; font-weight: bold; }
  
  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 13px;
    display: inline-block;
  }
  .bg-off { background: #374151; color: #d1d5db; }
  .bg-delay { background: #b45309; color: #fef3c7; animation: blink 1s infinite; }
  .bg-on { background: #991b1b; color: #fee2e2; }
  
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .btn-ble { background: var(--accent); color: white; }
  .btn-ble.connected { background: #374151; }
  .btn-arm { background: var(--danger); color: white; margin-bottom: 12px; }
  .btn-disarm { background: var(--success); color: white; }
  .btn-fire { background: #f59e0b; color: #000; font-size: 18px; letter-spacing: 0.2em; height: 70px; }
  .btn-action { background: #2d3142; color: #fff; padding: 8px 12px; font-size: 13px; width: auto; border-radius: 6px; }
  .btn:active { transform: scale(0.98); opacity: 0.9; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .ctrl-group { margin-bottom: 16px; }
  .ctrl-group:last-child { margin-bottom: 0; }
  .ctrl-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
  .ctrl-title { font-weight: 500; }
  .ctrl-num { color: var(--accent); font-weight: bold; }
  
  .flex-inputs { display: flex; gap: 10px; align-items: center; }
  input[type="range"] { flex: 1; accent-color: var(--accent); height: 6px; cursor: pointer; }
  input[type="number"] {
    width: 70px; background: #131722; border: 1px solid var(--border);
    color: #fff; padding: 6px; border-radius: 4px; text-align: center; font-size: 14px;
  }

  .toggle-container {
    display: flex; justify-content: space-between; align-items: center; padding: 6px 0;
  }
  .toggle-switch {
    width: 50px; height: 26px; background: #374151; border-radius: 13px;
    position: relative; cursor: pointer; transition: background 0.3s;
  }
  .toggle-switch::after {
    content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%;
    position: absolute; top: 3px; left: 3px; transition: transform 0.3s;
  }
  .toggle-switch.on { background: var(--success); }
  .toggle-switch.on::after { transform: translateX(24px); }

  #log {
    height: 120px; background: #0b0d14; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px; font-family: monospace; font-size: 11px;
    overflow-y: auto; white-space: pre-wrap;
  }
  .log-entry { margin-bottom: 4px; color: #a0aec0; }
  .log-success { color: var(--success); }
  .log-error { color: var(--danger); }
  .log-warn { color: var(--warning); }
</style>
</head>
<body>

<header>
  <h1>Moscart Launcher</h1>
  <div class="sub">Control Terminal v4.2</div>
</header>

<button id="btnConnect" class="btn btn-ble">🔷 BLEデバイスに接続</button>

<div class="card" style="margin-top:16px;">
  <div class="card-title">現在のステータス</div>
  <div class="status-grid">
    <div class="status-label">モード状態:</div>
    <div><span id="lblArmed" class="badge bg-off">切断中</span></div>
    
    <div class="status-label">レーダー検知:</div>
    <div id="lblDetected" class="status-val">—</div>
    
    <div class="status-label">ターゲット距離:</div>
    <div id="lblDistance" class="status-val">—</div>
    
    <div class="status-label">自動解除まで:</div>
    <div id="lblTimer" class="status-val">—</div>
  </div>
</div>

<div class="card">
  <div class="card-title">モード切替制御</div>
  <button id="btnArm" class="btn btn-arm" disabled>🔴 警戒モード ON (監視開始)</button>
  <button id="btnDisarm" class="btn btn-disarm" disabled>🟢 警戒モード OFF (安全解除)</button>
</div>

<div class="card">
  <div class="card-title">ダイレクトトリガー</div>
  <button id="btnFire" class="btn btn-fire" disabled>🔥 手動発火</button>
</div>

<div class="card">
  <div class="card-title">パラメータ調整</div>
  
  <div class="ctrl-group">
    <div class="ctrl-header">
      <span class="ctrl-title">検知有効距離</span>
      <span class="ctrl-num"><span id="distValue">100</span> cm</span>
    </div>
    <div class="flex-inputs">
      <input type="range" id="distSlider" min="10" max="500" value="100" disabled>
      <input type="number" id="distInput" min="10" max="500" value="100" disabled>
      <button id="btnSetDist" class="btn btn-action" disabled>設定</button>
    </div>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-header">
      <span class="ctrl-title">射撃後クールダウン</span>
      <span class="ctrl-num"><span id="cdValue">5</span> 秒</span>
    </div>
    <div class="flex-inputs">
      <input type="range" id="cdSlider" min="0" max="60" value="5" disabled>
      <input type="number" id="cdInput" min="0" max="300" value="5" disabled>
      <button id="btnSetCd" class="btn btn-action" disabled>設定</button>
    </div>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-header">
      <span class="ctrl-title">ON後の検知開始ディレイ</span>
      <span class="ctrl-num"><span id="sdValue">3</span> 秒</span>
    </div>
    <div class="flex-inputs">
      <input type="range" id="sdSlider" min="0" max="60" value="3" disabled>
      <input type="number" id="sdInput" min="0" max="60" value="3" disabled>
      <button id="btnSetSd" class="btn btn-action" disabled>設定</button>
    </div>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-header">
      <span class="ctrl-title">自動警戒解除タイマー (0で無効)</span>
      <span class="ctrl-num"><span id="adValue">0</span> 秒</span>
    </div>
    <div class="flex-inputs">
      <input type="range" id="adSlider" min="0" max="600" value="0" step="5" disabled>
      <input type="number" id="adInput" min="0" max="3600" value="0" disabled>
      <button id="btnSetAd" class="btn btn-action" disabled>設定</button>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">システムオプション</div>
  <div class="toggle-container">
    <span style="font-size:14px; font-weight:500;">Bluetooth切断時も警戒状態を維持する</span>
    <div id="keepArmedToggle" class="toggle-switch"></div>
  </div>
  <div style="display:flex; gap:10px; margin-top:14px;">
    <button id="btnSave" class="btn btn-action" style="flex:1; padding:10px;" disabled>💾 設定を永続保存</button>
    <button id="btnReset" class="btn btn-action" style="flex:1; padding:10px; background:#451a1a;" disabled>🔄 工場リセット</button>
  </div>
</div>

<div class="card">
  <div class="card-title">オペレーションログ</div>
  <div id="log"></div>
</div>

<script>
const SERVICE_UUID     = "12345678-1234-5678-1234-56789abcdef0";
const CHAR_CMD_UUID    = "12345678-1234-5678-1234-56789abcdef1";
const CHAR_STATUS_UUID = "12345678-1234-5678-1234-56789abcdef2";

let bleDevice = null;
let cmdCharacteristic = null;
let statusCharacteristic = null;
let connected = false;
let userInteracting = false; // スライダー操作中の引き戻し防止フラグ
let interactTimeout = null;

function log(msg, type='') {
  const consoleLog = document.getElementById('log');
  const d = new Date();
  const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  const entry = document.createElement('div');
  entry.className = `log-entry ${type ? 'log-'+type : ''}`;
  entry.textContent = `[${timeStr}] ${msg}`;
  consoleLog.appendChild(entry);
  consoleLog.scrollTop = consoleLog.scrollHeight;
}

// UI要素の有効化/無効化
function setUiEnabled(enabled) {
  const inputs = document.querySelectorAll('button:not(#btnConnect), input');
  inputs.forEach(el => el.disabled = !enabled);
}

// スライダーと入力ボックスの同期ヘルパー
function setupSync(sliderId, inputId, valueId, scale=1) {
  const slider = document.getElementById(sliderId);
  const input = document.getElementById(inputId);
  const valDisp = document.getElementById(valueId);

  slider.addEventListener('input', (e) => {
    userInteracting = true;
    clearTimeout(interactTimeout);
    input.value = e.target.value;
    valDisp.textContent = e.target.value;
  });
  input.addEventListener('input', (e) => {
    userInteracting = true;
    clearTimeout(interactTimeout);
    let v = parseInt(e.target.value) || 0;
    v = Math.max(parseInt(input.min), Math.min(parseInt(input.max), v));
    slider.value = Math.min(v, parseInt(slider.max));
    valDisp.textContent = v;
  });
  // 操作が終わってから2秒間はマイコンからの同期による引き戻しを防御する
  const release = () => {
    interactTimeout = setTimeout(() => { userInteracting = false; }, 2000);
  };
  slider.addEventListener('change', release);
  input.addEventListener('change', release);
}

setupSync('distSlider', 'distInput', 'distValue');
setupSync('cdSlider', 'cdInput', 'cdValue');
setupSync('sdSlider', 'sdInput', 'sdValue');
setupSync('adSlider', 'adInput', 'adValue');

// BLE通信
document.getElementById('btnConnect').addEventListener('click', async () => {
  if (connected) {
    if(bleDevice) await bleDevice.gatt.disconnect();
    return;
  }
  try {
    log('BLEデバイスを探しています...', 'warn');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    
    log('接続中...');
    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    cmdCharacteristic = await service.getCharacteristic(CHAR_CMD_UUID);
    statusCharacteristic = await service.getCharacteristic(CHAR_STATUS_UUID);
    
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
    
    // 通知の開始
    await statusCharacteristic.startNotifications();
    statusCharacteristic.addEventListener('characteristicvaluechanged', handleStatusNotify);
    
    connected = true;
    document.getElementById('btnConnect').textContent = '🔌 切断する';
    document.getElementById('btnConnect').className = 'btn btn-ble connected';
    setUiEnabled(true);
    log('通信が確立しました。同期完了。', 'success');
    
    // 初回ステータス要求
    sendCommand({cmd: "get_status"});
  } catch (err) {
    log(`接続失敗: ${err.message}`, 'error');
  }
});

function onDisconnected() {
  connected = false;
  document.getElementById('btnConnect').textContent = '🔷 BLEデバイスに接続';
  document.getElementById('btnConnect').className = 'btn btn-ble';
  document.getElementById('lblArmed').textContent = '切断中';
  document.getElementById('lblArmed').className = 'badge bg-off';
  document.body.classList.remove('armed');
  setUiEnabled(false);
  log('Bluetooth接続が切れました。', 'error');
}

async function sendCommand(obj) {
  if (!connected || !cmdCharacteristic) return;
  const str = JSON.stringify(obj);
  const enc = new TextEncoder();
  try {
    await cmdCharacteristic.writeValueWithoutResponse(enc.encode(str));
  } catch (err) {
    log(`コマンド送信失敗: ${err.message}`, 'error');
  }
}

// ステータス通知の受信処理
function handleStatusNotify(event) {
  const dec = new TextDecoder();
  const str = dec.decode(event.target.value);
  try {
    const data = JSON.parse(str);
    
    // モード表示の更新
    const lblArmed = document.getElementById('lblArmed');
    if (data.armed) {
      if (data.start_delay_remain > 0) {
        lblArmed.textContent = `監視開始まで あと ${data.start_delay_remain} 秒`;
        lblArmed.className = 'badge bg-delay';
        document.body.classList.add('armed');
      } else {
        lblArmed.textContent = '警戒中 (監視ON)';
        lblArmed.className = 'badge bg-on';
        document.body.classList.add('armed');
      }
    } else {
      lblArmed.textContent = '解除中 (安全OFF)';
      lblArmed.className = 'badge bg-off';
      document.body.classList.remove('armed');
    }
    
    // レーダー情報の更新
    document.getElementById('lblDetected').textContent = data.detected ? '⚠️ 動体検知あり' : 'クリア';
    document.getElementById('lblDetected').style.color = data.detected ? 'var(--danger)' : 'var(--success)';
    document.getElementById('lblDistance').textContent = data.target_cm > 0 ? `${data.target_cm} cm` : '—';
    
    // クールダウン状態のログ表示補助
    if (data.cooldown) document.getElementById('lblDistance').textContent += " (冷却中)";

    // タイマー表示
    const lblTimer = document.getElementById('lblTimer');
    if (data.armed) {
      if (data.start_delay_remain > 0) {
        lblTimer.textContent = 'ディレイ待機中...';
      } else if (data.auto_disarm_remain >= 0) {
        lblTimer.textContent = `${data.auto_disarm_remain} 秒 / ${data.auto_disarm_sec} 秒`;
      } else {
        lblTimer.textContent = '常時警戒モード';
      }
    } else {
      lblTimer.textContent = '—';
    }
    
    // オプションスイッチの同期
    const toggle = document.getElementById('keepArmedToggle');
    if (data.keep_armed) toggle.classList.add('on');
    else toggle.classList.remove('on');

    // ★重要: ユーザーが今スライダーを指で操作中でなければ、マイコン側の正確な数値をUIに反映する
    if (!userInteracting) {
      document.getElementById('distSlider').value = data.distance;
      document.getElementById('distInput').value = data.distance;
      document.getElementById('distValue').textContent = data.distance;
      
      const cdSec = data.cooldown_ms / 1000;
      document.getElementById('cdSlider').value = cdSec;
      document.getElementById('cdInput').value = cdSec;
      document.getElementById('cdValue').textContent = cdSec;
      
      document.getElementById('sdSlider').value = data.start_delay_sec;
      document.getElementById('sdInput').value = data.start_delay_sec;
      document.getElementById('sdValue').textContent = data.start_delay_sec;

      document.getElementById('adInput').value = data.auto_disarm_sec;
      document.getElementById('adSlider').value = Math.min(data.auto_disarm_sec, 600);
      document.getElementById('adValue').textContent = data.auto_disarm_sec;
    }
    
  } catch (e) {
    // パースエラーは無視
  }
}

// UIイベント定義
document.getElementById('btnArm').addEventListener('click', () => { sendCommand({cmd: 'arm'}); log('🔴 警戒モードを有効化しました (監視ディレイ開始)'); });
document.getElementById('btnDisarm').addEventListener('click', () => { sendCommand({cmd: 'disarm'}); log('🟢 警戒モードを解除しました'); });
document.getElementById('btnFire').addEventListener('click', () => { sendCommand({cmd: 'fire'}); });

document.getElementById('btnSetDist').addEventListener('click', () => {
  const v = parseInt(document.getElementById('distInput').value);
  sendCommand({cmd: 'set_distance', value: v});
  log(`設定変更: 有効距離を ${v} cm に指定`);
});
document.getElementById('btnSetCd').addEventListener('click', () => {
  const v = parseInt(document.getElementById('cdInput').value);
  sendCommand({cmd: 'set_cooldown', value: v});
  log(`設定変更: クールダウンを ${v} 秒に指定`);
});
document.getElementById('btnSetSd').addEventListener('click', () => {
  const v = parseInt(document.getElementById('sdInput').value);
  sendCommand({cmd: 'set_start_delay', value: v});
  log(`設定変更: 監視開始ディレイを ${v} 秒に指定`);
});
document.getElementById('btnSetAd').addEventListener('click', () => {
  const v = parseInt(document.getElementById('adInput').value);
  sendCommand({cmd: 'set_auto_disarm', value: v});
  log(`設定変更: 自動解除タイマーを ${v} 秒に指定`);
});

document.getElementById('keepArmedToggle').addEventListener('click', () => {
  if (!connected) return;
  const toggle = document.getElementById('keepArmedToggle');
  const isNowOn = toggle.classList.contains('on');
  sendCommand({cmd: 'set_keep_armed', value: !isNowOn});
  log(`オプション: 切断時警戒維持を ${!isNowOn ? 'ON' : 'OFF'} に切り替え`);
});

document.getElementById('btnSave').addEventListener('click', () => { sendCommand({cmd: 'save_settings'}); log('💾 パラメータをマイコンの内蔵フラッシュ(NVS)に保存しました', 'success'); });
document.getElementById('btnReset').addEventListener('click', () => {
  if (confirm('すべての内部設定をデフォルト(初期値)に戻しますか？')) {
    sendCommand({cmd: 'reset_settings'});
    log('🔄 システムパラメータを初期化しました', 'warn');
  }
});
</script>
</body>
</html>
